<div class="fixed inset-0 z-[1000] flex-center p-4 bg-black/50" (click)="cancel.emit()">
  <div class="bg-white rounded-[18px] w-full max-w-md p-6 shadow-2xl" (click)="$event.stopPropagation()">
    <h3 class="text-[17px] font-extrabold text-primary mb-1">{{ title() }}</h3>
    <p class="text-[12.5px] text-primary-400 leading-relaxed mb-4">{{ message() }}</p>

    <input type="password" [placeholder]="placeholder()" autocomplete="current-password"
      [ngModel]="password()" (ngModelChange)="password.set($event)"
      (keyup.enter)="submit()" [disabled]="busy()"
      class="w-full px-3 py-2.5 rounded-[10px] border-[1.5px] border-primary-200 outline-none text-[13.5px] text-primary focus:border-accent transition-colors" />

    @if (error()) {
      <p class="text-[12px] text-red-500 font-medium mt-2">{{ error() }}</p>
    }

    <div class="flex gap-3 mt-5">
      <button (click)="cancel.emit()" [disabled]="busy()"
        class="flex-1 py-2.5 rounded-[10px] text-[13px] font-bold border-[1.5px] border-primary-200 text-primary transition-all hover:bg-slate-50 disabled:opacity-60">
        Cancelar
      </button>
      <button (click)="submit()" [disabled]="busy()"
        class="flex-1 py-2.5 rounded-[10px] text-[13px] font-bold text-white transition-all disabled:opacity-70 flex-center gap-2"
        [style.background]="variant() === 'danger' ? '#dc2626' : '#00C4A7'">
        @if (busy()) {
          <div class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></div>
          {{ busyLabel() }}
        } @else {
          {{ confirmLabel() }}
        }
      </button>
    </div>
  </div>
</div>
