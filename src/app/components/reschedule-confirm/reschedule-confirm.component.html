<div class="backdrop" (click)="cancelled.emit()"></div>

<div class="modal">
  <div class="modal-icon">
    <svg width="22" height="22" fill="none" stroke="#00C4A7" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M3 9h18M8 2v4M16 2v4"/>
    </svg>
  </div>

  <h3 class="modal-title">¿Confirmas el cambio de horario?</h3>

  <p class="modal-sub">Cita de <strong>{{ customerName() }}</strong></p>

  <div class="modal-detail">
    <span class="detail-label">Nueva fecha</span>
    <span class="detail-value">{{ formatDate(newDate()) }}</span>
  </div>
  <div class="modal-detail">
    <span class="detail-label">Nueva hora</span>
    <span class="detail-value">{{ newTime() }}</span>
  </div>

  <p class="modal-note">
    Esto no tendrá costo adicional ni para ti ni para el cliente.
  </p>

  <div class="modal-actions">
    <button class="btn-cancel" (click)="cancelled.emit()" [disabled]="saving()">
      Cancelar
    </button>
    <button class="btn-confirm" (click)="confirmed.emit()" [disabled]="saving()">
      @if (saving()) {
        <svg class="spin" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
        Guardando...
      } @else {
        Confirmar cambio
      }
    </button>
  </div>
</div>
