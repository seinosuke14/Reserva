<section *ngIf="available()" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="flex items-start gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-blue-50">
      <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3" y="4" width="18" height="17" rx="3" stroke="#2563eb" stroke-width="1.6" />
        <path d="M3 9h18M8 2.5V6M16 2.5V6" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round" />
      </svg>
    </div>
    <div class="flex-1">
      <h3 class="text-base font-semibold text-slate-800">Google Calendar</h3>
      <p class="mt-0.5 text-sm text-slate-500">
        Sincroniza automáticamente tus citas con tu calendario de Google.
      </p>
    </div>
  </div>

  <!-- Próximamente (bloqueo temporal mientras Google verifica la app) -->
  <div *ngIf="comingSoon" class="mt-4">
    <div class="flex items-center gap-2 rounded-lg bg-amber-50 px-3 py-2.5 text-sm font-medium text-amber-700">
      <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" />
        <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      Próximamente habilitado para ti
    </div>
    <button type="button" disabled
            class="mt-3 inline-flex cursor-not-allowed items-center gap-2 rounded-xl bg-slate-100 px-4 py-2.5 text-sm font-semibold text-slate-400">
      Conectar con Google Calendar
    </button>
  </div>

  <!-- Mensaje de resultado -->
  <div *ngIf="msg() as m"
       class="mt-4 rounded-lg px-3 py-2 text-sm"
       [ngClass]="{
         'bg-emerald-50 text-emerald-700': m.type === 'success',
         'bg-red-50 text-red-600':         m.type === 'error',
         'bg-blue-50 text-blue-700':       m.type === 'info'
       }">
    {{ m.text }}
  </div>

  <!-- Cargando -->
  <div *ngIf="loading()" class="mt-4 text-sm text-slate-400">Cargando estado…</div>

  <!-- Desconectado -->
  <div *ngIf="!comingSoon && !loading() && !status().connected" class="mt-4">
    <button type="button"
            (click)="connect()"
            [disabled]="busy()"
            class="inline-flex items-center gap-2 rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:opacity-60">
      <span>Conectar con Google Calendar</span>
    </button>
  </div>

  <!-- Conectado -->
  <div *ngIf="!comingSoon && !loading() && status().connected" class="mt-4 space-y-4">
    <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2.5">
      <div class="min-w-0">
        <p class="truncate text-sm font-medium text-slate-700">
          {{ status().accountEmail || 'Cuenta de Google' }}
        </p>
        <p class="text-xs"
           [ngClass]="status().syncEnabled ? 'text-emerald-600' : 'text-amber-600'">
          {{ status().syncEnabled ? 'Sincronización activa' : 'Sincronización pausada' }}
        </p>
      </div>
      <span class="ml-2 inline-flex h-2.5 w-2.5 shrink-0 rounded-full"
            [ngClass]="status().syncEnabled ? 'bg-emerald-500' : 'bg-amber-400'"></span>
    </div>

    <div class="flex flex-wrap gap-2">
      <button type="button"
              (click)="toggleSync()"
              [disabled]="busy()"
              class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 disabled:opacity-60">
        {{ status().syncEnabled ? 'Pausar sincronización' : 'Activar sincronización' }}
      </button>
      <button type="button"
              (click)="disconnect()"
              [disabled]="busy()"
              class="rounded-lg border border-red-200 px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50 disabled:opacity-60">
        Desconectar
      </button>
    </div>
  </div>
</section>
