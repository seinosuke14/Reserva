<div class="portal-root">
  <app-booking-header [professional]="professional()"></app-booking-header>

  <main class="portal-main">
    <!-- Loading state -->
    @switch (loadState()) {
      @case ('loading') {
        <div class="state-screen">
          <div class="spin">⏳</div>
          <p>Cargando...</p>
        </div>
      }
      @case ('error') {
        <div class="state-screen">
          <p class="state-error">❌ Error al cargar el perfil</p>
        </div>
      }
      @default {
        <!-- Step indicator -->
        <app-booking-step-indicator [currentStep]="step()"></app-booking-step-indicator>

        <!-- Step 1: Service selection -->
        @if (step() === 1) {
          <app-booking-service-selector
            [services]="services()"
            [selectedService]="selectedService()"
            (serviceSelected)="selectService($event)">
          </app-booking-service-selector>
        }

        <!-- Step 2: Date & Time selection -->
        @if (step() === 2) {
          <app-booking-datetime-selector
            [availability]="availability()"
            [selectedDate]="selectedDate()"
            [selectedHour]="selectedHour()"
            (dateSelected)="selectDate($event)"
            (hourSelected)="selectHour($event)">
          </app-booking-datetime-selector>
        }

        <!-- Step 3: Form & Summary -->
        @if (step() === 3) {
          <app-booking-form
            [selectedService]="selectedService()"
            [selectedDate]="selectedDate()"
            [selectedHour]="selectedHour()"
            [emailStatus]="emailCheckState()"
            [showLoginHint]="showLoginHint()">
          </app-booking-form>
        }

        <!-- Actions -->
        <app-booking-actions
          [currentStep]="step()"
          [canProceed]="getCanProceed()"
          (back)="goBack()"
          (next)="goNext()"
          (confirm)="confirmBooking()">
        </app-booking-actions>
      }
    }
  </main>

  <app-booking-footer></app-booking-footer>
</div>
