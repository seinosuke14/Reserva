<section id="faq" class="section">
  <div class="container">
    <div class="section-head">
      <div class="section-eyebrow">Preguntas frecuentes</div>
      <h2 class="h2">Lo que <span class="serif">probablemente te preguntas.</span></h2>
    </div>
    <div class="faq-wrap">
      @for (item of faqItems; track $index; let i = $index) {
        <div [class]="'faq-item' + (faqOpen() === i ? ' open' : '')">
          <button class="faq-q" (click)="toggleFaq(i)">
            <span>{{ item.q }}</span>
            <span class="plus">+</span>
          </button>
          <div class="faq-a">
            <p style="margin:0">{{ item.a }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
